<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-3">


<div>
    Teacher <br>
    <input type="text" id="teacher" placeholder="Enter Teacher Name"><br>

    Student <br>
    <input type="text" id="student" placeholder="Enter Student Name"> <br>

    Student Grade <br>
    <input type="" id="grade" placeholder="Enter Grade"><br>

    <button onclick="checkGrade()" class="btn btn-info">Submit</button>
</div>

<h3 id="result"></h3>

<script>

function checkGrade(){

    let teacher = document.getElementById("teacher").value;
    let student = document.getElementById("student").value;
    let grade = document.getElementById("grade").value;

    if(grade >= 80){
        document.getElementById("result").innerHTML =
        student + " :Pasar (Grade: " + grade + ")";
    }
    else{
        document.getElementById("result").innerHTML =
        student + " :Lawlaw (Grade: " + grade + ")";
    }

}
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker Registered"));
}

</script>

</body>
</html>
